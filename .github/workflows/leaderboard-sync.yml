name: Leaderboard Sync

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours (UTC)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -sS -X POST "https://szvtaultgixkfzpkquwo.functions.supabase.co/leaderboard-sync" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_JWT }}" \
            -H "x-cron-secret: ${{ secrets.LEADERBOARD_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{}"
