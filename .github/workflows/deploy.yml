name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify SSH key format (no leak)
        shell: bash
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          sed -i 's/\r$//' /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keygen -lf /tmp/deploy_key

      - name: Deploy debug (raw ssh)
        shell: bash
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          sed -i 's/\r$//' /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keygen -lf /tmp/deploy_key

          ssh -vvv -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              -i /tmp/deploy_key \
              deploy@138.197.2.64 "whoami && hostname"
