name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            cd ~/rytm
            git fetch origin
            git reset --hard origin/main

            # Export env vars for docker compose (runtime + build args)
            export NEXT_PUBLIC_SUPABASE_URL='${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}'
            export NEXT_PUBLIC_SUPABASE_ANON_KEY='${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}'
            export SUPABASE_SERVICE_ROLE_KEY='${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}'
            export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
            export NEXTAUTH_SECRET='${{ secrets.NEXTAUTH_SECRET }}'
            export NEXTAUTH_URL='${{ secrets.NEXTAUTH_URL }}'
            export NODE_ENV='production'
            export FITBIT_CLIENT_ID='${{ secrets.FITBIT_CLIENT_ID }}'
            export FITBIT_CLIENT_SECRET='${{ secrets.FITBIT_CLIENT_SECRET }}'
            export FITBIT_REDIRECT_URI='${{ secrets.FITBIT_REDIRECT_URI }}'
            export GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}'
            export GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}'
            export GOOGLE_REDIRECT_URI='${{ secrets.GOOGLE_REDIRECT_URI }}'
            export WHOOP_CLIENT_ID='${{ secrets.WHOOP_CLIENT_ID }}'
            export WHOOP_CLIENT_SECRET='${{ secrets.WHOOP_CLIENT_SECRET }}'
            export WHOOP_REDIRECT_URI='${{ secrets.WHOOP_REDIRECT_URI }}'
            export WHOOP_AUTH_URL='${{ secrets.WHOOP_AUTH_URL }}'
            export WHOOP_TOKEN_URL='${{ secrets.WHOOP_TOKEN_URL }}'
            # Report/email configuration removed — reporting runs from GitHub Actions (secrets remain in Actions only)
            export BUILD_TIME="$(date +%s)"

            # Build & deploy
            docker compose -f docker-compose.prod.yml pull app || true
            docker compose -f docker-compose.prod.yml build --no-cache app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

