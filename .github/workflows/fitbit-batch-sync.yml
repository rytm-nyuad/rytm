name: Fitbit Batch Sync

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days back to sync (daysBack)"
        required: false
        default: "14"
      users:
        description: "Optional: comma-separated app_user_id list (leave empty to use script defaults)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Match your project's Node version if different
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Fitbit batch sync script
        env:
          # Supabase URL (can be NEXT_PUBLIC_SUPABASE_URL or SUPABASE_URL – your script checks both)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }} # optional fallback if you prefer
          # Service role key so the script can bypass RLS and write to tables
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Fitbit OAuth credentials (used by refreshFitbitAccessToken in fitbit.ts)
          FITBIT_CLIENT_ID: ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
        run: |
          DAYS="${{ github.event.inputs.days }}"
          USERS="${{ github.event.inputs.users }}"

          # Default days if empty (defensive)
          if [ -z "$DAYS" ]; then
            DAYS="14"
          fi

          echo "➡️ Running batch Fitbit sync"
          echo "   daysBack = $DAYS"
          if [ -n "$USERS" ]; then
            echo "   users    = $USERS"
            npx ts-node scripts/syncFitbitBatch.ts --days="$DAYS" --users="$USERS"
          else
            echo "   users    = (using script DEFAULT_USER_IDS)"
            npx ts-node scripts/syncFitbitBatch.ts --days="$DAYS"
          fi
