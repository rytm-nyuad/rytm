name: Fitbit Batch Sync

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days back to sync (daysBack)"
        required: false
        default: "2"
      users:
        description: "Optional: comma-separated app_user_id list (leave empty to use script defaults)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 👇 Install tsx JUST for this workflow run (no need to commit it)
      - name: Install tsx runtime
        run: npm install tsx --no-save

      - name: Run Fitbit batch sync script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FITBIT_CLIENT_ID: ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
        run: |
          DAYS="${{ github.event.inputs.days }}"
          USERS="${{ github.event.inputs.users }}"

          if [ -z "$DAYS" ]; then
            DAYS="14"
          fi

          echo "➡️ Running batch Fitbit sync"
          echo "   daysBack = $DAYS"

          if [ -n "$USERS" ]; then
            echo "   users    = $USERS"
            npx tsx scripts/syncFitbitBatch.ts --days="$DAYS" --users="$USERS"
          else
            echo "   users    = (using script DEFAULT_USER_IDS)"
            npx tsx scripts/syncFitbitBatch.ts --days="$DAYS"
          fi
